openapi: 3.1.1

info:
  title: MiniBlog API
  version: 1.0.0
  description: API REST para gestionar autores y posts del servicio MiniBlog
  contact:
    name: DevSpark
    email: dev@devspark.com

servers:
  - url: http://localhost:3000
    description: Servidor de desarrollo
  - url: https://api.miniblog.railway.app
    description: Servidor de producción

components:
  schemas:
    Author:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Ana García
        email:
          type: string
          example: ana@mail.com
        bio:
          type: string
          example: Escritora y desarrolladora

    Post:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Mi primer post
        content:
          type: string
          example: Contenido del post
        author_id:
          type: integer
          example: 1
        published:
          type: boolean
          example: false
        created_at:
          type: string
          format: date-time
          example: 2024-01-15T10:30:00Z

    PostsByAuthor:
      type: object
      properties:
        author:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            email:
              type: string
            bio:
              type: string
        posts:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              title:
                type: string
              content:
                type: string
              published:
                type: boolean
              created_at:
                type: string
                format: date-time

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: Mensaje de error

paths:

  # ─────────────────────────────────────────────
  # AUTHORS
  # ─────────────────────────────────────────────

  /authors:
    get:
      summary: Obtener todos los autores
      description: Devuelve una lista de todos los autores ordenados por ID ascendente
      tags:
        - Authors
      responses:
        '200':
          description: Lista de autores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Author'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Crear un nuevo autor
      description: Crea un autor con name, email y bio. El email debe ser único.
      tags:
        - Authors
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
              properties:
                name:
                  type: string
                  maxLength: 100
                  example: Ana García
                email:
                  type: string
                  example: ana@mail.com
                bio:
                  type: string
                  example: Escritora y desarrolladora
      responses:
        '201':
          description: Autor creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '400':
          description: Campos obligatorios faltantes o inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: El email ya está en uso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /authors/{id}:
    get:
      summary: Obtener un autor por ID
      tags:
        - Authors
      parameters:
        - name: id
          in: path
          required: true
          description: ID del autor
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Autor encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '404':
          description: Autor no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Actualizar un autor
      description: Actualiza name, email y/o bio de un autor existente. El email debe ser único entre otros autores.
      tags:
        - Authors
      parameters:
        - name: id
          in: path
          required: true
          description: ID del autor a actualizar
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
              properties:
                name:
                  type: string
                  maxLength: 100
                  example: Ana García Actualizada
                email:
                  type: string
                  example: ana_nueva@mail.com
                bio:
                  type: string
                  example: Bio actualizada
      responses:
        '200':
          description: Autor actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '400':
          description: Campos obligatorios faltantes o inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Autor no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: El email ya está en uso por otro autor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Eliminar un autor
      description: Elimina un autor por ID y devuelve el autor eliminado
      tags:
        - Authors
      parameters:
        - name: id
          in: path
          required: true
          description: ID del autor a eliminar
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Autor eliminado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '404':
          description: Autor no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ─────────────────────────────────────────────
  # POSTS
  # ─────────────────────────────────────────────

  /posts:
    get:
      summary: Obtener todos los posts
      description: Devuelve una lista de todos los posts ordenados por ID ascendente
      tags:
        - Posts
      responses:
        '200':
          description: Lista de posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Crear un nuevo post
      description: Crea un post con title, content, author_id y published. El title y content deben ser únicos. El author_id debe existir.
      tags:
        - Posts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - content
                - author_id
              properties:
                title:
                  type: string
                  maxLength: 255
                  example: Mi primer post
                content:
                  type: string
                  example: Contenido del post
                author_id:
                  type: integer
                  example: 1
                published:
                  type: boolean
                  example: false
      responses:
        '201':
          description: Post creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          description: Campos obligatorios faltantes, inválidos o author_id inexistente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: El título o contenido ya existe en otro post
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /posts/{id}:
    get:
      summary: Obtener un post por ID
      tags:
        - Posts
      parameters:
        - name: id
          in: path
          required: true
          description: ID del post
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Post encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Actualizar un post
      description: Actualiza title, content y/o published de un post existente. El title y content deben ser únicos entre otros posts.
      tags:
        - Posts
      parameters:
        - name: id
          in: path
          required: true
          description: ID del post a actualizar
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - content
              properties:
                title:
                  type: string
                  maxLength: 255
                  example: Título actualizado
                content:
                  type: string
                  example: Contenido actualizado
                published:
                  type: boolean
                  example: true
      responses:
        '200':
          description: Post actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '400':
          description: Campos obligatorios faltantes o inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: El título o contenido ya existe en otro post
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Eliminar un post
      description: Elimina un post por ID y devuelve el post eliminado
      tags:
        - Posts
      parameters:
        - name: id
          in: path
          required: true
          description: ID del post a eliminar
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Post eliminado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '404':
          description: Post no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /posts/author/{id}:
    get:
      summary: Obtener posts por autor
      description: Devuelve todos los posts de un autor específico junto con los datos del autor
      tags:
        - Posts
      parameters:
        - name: id
          in: path
          required: true
          description: ID del autor
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Posts del autor encontrados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostsByAuthor'
        '400':
          description: El author_id no existe o es inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: El autor no tiene posts publicados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'